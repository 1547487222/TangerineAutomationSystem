syntax = "proto3";

package smartlab;

option csharp_namespace = "Tangerine.Grpc.Foundation";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

// ----------------------------------------
// УЖОйЖЈвх
// ----------------------------------------

// ЦНЬЈзДЬЌУЖОй
enum PlatformStatus {
  PLATFORM_STATUS_NOT_INITIALIZED   = 0; // ЮДГѕЪМЛЏЃКЦНЬЈВЛПЩжДаа
  PLATFORM_STATUS_IN_PROGRESS       = 2; // ЦНЬЈШЮЮёжаЃКЕБЧАгаШЮЮёе§дкжДаа
  PLATFORM_STATUS_IDLE              = 3; // ЦНЬЈПеЯаЃЌЦНЬЈЕШД§ЦєЖЏ
  PLATFORM_STATUS_STARTED           = 1; // ЦНЬЈвбЦєЖЏЃКЦНЬЈвбЦєЖЏЃЌЕШД§ШЮЮё
  PLATFORM_STATUS_FAILED            = 4; // ЦНЬЈДэЮѓЃКЦНЬЈжДаажаЗЂЩњвьГЃ
  PLATFORM_STATUS_PAUSED            = 5; // ЦНЬЈднЭЃЃКЦНЬЈднЪББЛЙвЦ№
  PLATFORM_STATUS_STOP              = 6; // ЦНЬЈЭЃжЙЃКЦНЬЈвбБЛжїЖЏЭЃжЙЃЈзЊЮЊЮДГѕЪМЛЏЃЉ
}

// ШЮЮёзДЬЌУЖОй
enum TaskStatus {
  TASK_STATUS_RUNNING    = 0; // дЫаажа
  TASK_STATUS_FINISHED   = 1; // вбЭъГЩ
  TASK_STATUS_FAILED     = 2; // вьГЃ
  TASK_STATUS_PAUSED     = 3; // днЭЃ
  TASK_STATUS_NOT_FOUND  = 4; // ЮДевЕН
  TASK_STATUS_CANCELED   = 5; // вбШЁЯћ
  TASK_STATUS_REENTRY    = 6; // ШЮЮёжиШы
}

//жазЊзДЬЌУЖОй
enum TransferStatus 
{
  //еМгУ
  TRANSFER_STATUS_OCCUPIED = 0;
  //ПеЯа
  TRANSFER_STATUS_IDLE = 1;
}


// ----------------------------------------
// ЯћЯЂЖЈвх
// ----------------------------------------

// ЭЈгУзДЬЌЗЕЛи
message Status {
  int32 code     = 1; // 0=ГЩЙІЃЌЗЧ0=ДэЮѓТы
  string message = 2; // зДЬЌУшЪі
}

message StartTaskStatus
{
  TaskStatus status = 1;  // ШЮЮёзДЬЌ
  string message    = 2;     // зДЬЌУшЪі
}


// ЦНЬЈЧыЧѓЃЈЭЈгУЃЉ
message PlatformRequest {
  int64 platform_id = 1; // ЦНЬЈ ID
}

// ----------------------------------------
// НјбљШЮЮёаХЯЂ
// ----------------------------------------

message SamplingTaskInfo {
  int64 original_sample_id = 1;   // д­ЪМНјбљ ID
  int64  sample_id         = 2;   // ЮЈвЛНјбљ ID
  int32  sample_group_id   = 3;   // Нјбљзщ ID
  string sample_type       = 4;   // бљЦЗРраЭ
  string sample_name       = 5;   // бљЦЗУћГЦ
  string sample_remarks    = 6;   // бљЦЗБИзЂ
  int64  tray_id           = 7;   // ЭаХЬ ID
  int64  well_id           = 8;   // ПзЮЛ IDЃЈФПЧАЕШЭЌгкНјбљ IDЃЉ
  string well_name         = 9;   // ПзЮЛУћГЦ
}

// ----------------------------------------
// ЪЕбщЪвХфжУ
// ----------------------------------------

message LaboratoryDefinition {
  string laboratory_json = 4; // ЪЕбщЪвХфжУФкШнЃЈJSON ИёЪНЃЉ
}

// ----------------------------------------
// ЦНЬЈзДЬЌЯьгІ
// ----------------------------------------

message PlatformStatusResponseMessage {
  int64 platform_id      = 2; // ЦНЬЈ IDЃЈЛиЯдЃЉ
  PlatformStatus platform_status = 5; // ЦНЬЈЕБЧАзДЬЌ
}

// ----------------------------------------
// ИцОЏаХЯЂ
// ----------------------------------------

message AlarmEvent {
  int64 platform_id = 2;            // ЦНЬЈ IDЃЈЛиЯдЃЉ
  ModularAlarm modular_alarm = 5;  // ФЃПщИцОЏ
}

message ModularAlarm {
  string module_ip           = 1; // ФЃПщ IP
  string module_name         = 2; // ФЃПщУћГЦ
  string alarm_code          = 3; // ИцОЏБрТы
  string action_description  = 4; // ИцОЏЖЏзїУшЪі
  string internal_alarm_message   = 5; // ФкВПИцОЏаХЯЂ
  string details_alarm_message    = 6; // ЯъЯИИцОЏаХЯЂ
  google.protobuf.Timestamp record_time = 7; // ИцОЏЪБМф
}

// ----------------------------------------
// жазЊЗўЮё
// ----------------------------------------

message TransferInitRequest {
  int64 transfer_module_id = 2; // жазЊФЃПщ ID
}


message TransferInitResponseMessage {
  int64 transfer_module_id  = 2; // жазЊФЃПщ ID
  Status status             = 3; // жДаазДЬЌ
}

// ----------------------------------------
// жазЊЯћЯЂНсЙЙ
// ----------------------------------------


message TransferTrayMoveRequest {
  int64 platform_id           = 2; // ЦНЬЈ ID
  int64 transfer_module_id    = 4; // жазЊФЃПщ ID
  repeated SamplingTaskInfo sampling_task_infos = 5; // НјбљШЮЮёаХЯЂЃЈБиЬюЃЉ
}

message TransferTrayMoveResponse 
{
  int64 platform_id           = 2; // ЦНЬЈ ID
  int64 transfer_module_id    = 4; // жазЊФЃПщ ID
  Status status               = 5; // жДаазДЬЌ
}

/*
*жазЊЯТСЯЮЛЕНжазЊЕФЩЯСЯЮЛ
*/
message UnloadTransferToLoadTransferRequest {
    int64 unload_transfer_module_id  = 2; // ЯТСЯЮЛжазЊФЃПщ ID
    int64 load_transfer_module_id    = 3; // ЩЯСЯЮЛжазЊФЃПщ ID
    repeated SamplingTaskInfo sampling_task_infos = 4; // НјбљШЮЮёаХЯЂЃЈБиЬюЃЉ
}

//жазЊЯТСЯЮЛЕНжазЊЕФЩЯСЯЮЛЯьгІ
message UnloadTransferToLoadTransferResponse
{
    int64 unload_transfer_module_id  = 2; // ЯТСЯЮЛжазЊФЃПщ ID
    int64 load_transfer_module_id    = 3; // ЩЯСЯЮЛжазЊФЃПщ ID
    Status status                    = 4; // жДаазДЬЌ
}

/*
*жазЊЩЯСЯЮЛЕНжазЊЕФЯТСЯЮЛ
*/
message LoadTransferToUnloadTransferRequest {
    int64 load_transfer_module_id      = 2; // ЩЯСЯЮЛжазЊФЃПщ ID
    int64 unload_transfer_module_id    = 3; // ЯТСЯЮЛжазЊФЃПщ ID
    repeated SamplingTaskInfo sampling_task_infos = 4; // НјбљШЮЮёаХЯЂЃЈБиЬюЃЉ
}
//жазЊЩЯСЯЮЛЕНжазЊЕФЯТСЯЮЛЯьгІ
message LoadTransferToUnloadTransferResponse
{
    int64 load_transfer_module_id      = 2; // ЩЯСЯЮЛжазЊФЃПщ ID
    int64 unload_transfer_module_id    = 3; // ЯТСЯЮЛжазЊФЃПщ ID
    Status status                      = 4; // жДаазДЬЌ
}

/*
*жазЊвЦЖЏ
*/
message TransferMoveRequest {
  int64 transfer_module_id    = 2; // жазЊФЃПщ ID
  repeated SamplingTaskInfo sampling_task_infos = 5; // НјбљШЮЮёаХЯЂЃЈБиЬюЃЉ
}

/*
*жазЊвЦЖЏЯьгІ
*/
message TransferMoveResponseMessage {
  int64  transfer_module_id     = 4; // жазЊФЃПщ ID
  Status status                = 5; // жДаазДЬЌ
}

//ЛёШЁжазЊзДЬЌ
message TransferStatusRequest 
{
  int64 transfer_module_id    = 2; // жазЊФЃПщ ID

}
//ЛёШЁжазЊзДЬЌЯьгІ
message TransferStatusResponseMessage 
{
  int64 transfer_module_id       = 2; // жазЊФЃПщ ID
  TransferStatus transfer_status = 5; // жазЊзДЬЌ
}



// ----------------------------------------
// ЦНЬЈГѕЪМЛЏ
// ----------------------------------------

message InitializeRequest {
  int64 platform_id = 2;                  // ЦНЬЈ ID
  map<string, string> context = 4;        // ХфжУЩЯЯТЮФаХЯЂ
}

// ----------------------------------------
// ШЮЮёЗўЮё
// ----------------------------------------

message PrepareTaskRequest {
  int64  task_id            = 1;
  string process_flow_id    = 2;           // ЙЄвеСїГЬ ID
  int64  platform_id        = 3;
  map<string, string> context = 4;        // ХфжУЩЯЯТЮФ
}

message SetupTaskRequest
{
  int64  task_id            = 1;
  int64  platform_id        = 2;
  string process_flow_id    = 3;           // ЙЄвеСїГЬ ID
  map<string, string> context = 4;        // ХфжУЩЯЯТЮФ
}

message StartTaskRequest {
  int64  task_id                 = 1;
  int64  platform_id             = 2;
  string process_flow_id         = 3;      // ЙЄвеСїГЬ ID
  repeated SamplingTaskInfo sampling_task_infos = 4; // НјбљШЮЮёаХЯЂ
  map<string, string> context    = 5;      // ШЮЮёВЮЪ§ЃЈJSON ИёЪНЃЉ
}

message StoreTaskRequest {
  int64 platform_id = 2; // ЦНЬЈ ID
  map<string, string> context = 4;        // ХфжУЩЯЯТЮФ
}

message FinalizeTaskRequest {
  int64 platform_id = 2; // ЦНЬЈ ID
  map<string, string> context = 4;        // ХфжУЩЯЯТЮФ
}

message TaskTrayUsageRequest {
  int64 platform_id = 1; // ЦНЬЈ ID
  int64 task_id     = 2; // ШЮЮё ID
}

message TaskTrayUsageReply {
  int64  platform_id     = 2; // ЦНЬЈ IDЃЈЛиЯдЃЉ
  string task_usage_json = 5; // ШЮЮёЪЙгУЧщПіЃЈJSON ИёЪНЃЉ//аЏДјЭаХЬПзЮЛзДЬЌ
}

message TaskTracesRequest {
  int64 task_id     = 1; // ШЮЮё ID
  int64 platform_id = 2; // ЦНЬЈ ID
}

message TaskTracesReply {
  int64 platform_id = 1; // ЦНЬЈ IDЃЈЛиЯдЃЉ
  int64 task_id     = 3; // ШЮЮё IDЃЈЛиЯдЃЉ
  repeated SampleTraceMessage sample_trace_infos = 5;
}

//ШЮЮёжаЦїУѓЧщПі
message TaskTrayLabwareInfoRequest 
{
  int64 task_id     = 1; // ШЮЮё ID
  int64 platform_id = 2; // ЦНЬЈ ID
}
message TaskTrayLabwareInfoReply
{
  int64  platform_id = 1; // ЦНЬЈ IDЃЈЛиЯдЃЉ
  int64  task_id     = 3; // ШЮЮё IDЃЈЛиЯдЃЉ 
  string task_tray_labware_info_json = 5; //ШЮЮёжаЦїУѓЧщПіЃЈJSON ИёЪНЃЉ
}

message TaskTrayInitialBindingInfoRequest
{
  int64 task_id     = 1; // ШЮЮё ID
  int64 platform_id = 2; // ЦНЬЈ ID
}
message TaskTrayInitialBindingInfoReply
{
  int64  platform_id = 1; // ЦНЬЈ IDЃЈЛиЯдЃЉ
  int64  task_id     = 3; // ШЮЮё IDЃЈЛиЯдЃЉ
  string task_tray_initial_binding_info_json = 5; //ШЮЮёжаИїПзЮЛЪзДЮЩЈТыАѓЖЈаХЯЂЧщПіЃЈJSON ИёЪНЃЉ
}


// ----------------------------------------
// МрПиЗўЮё
// ----------------------------------------

message StartMonitorRequest {
  int64 platform_id       = 2; // ЦНЬЈ ID
  int32 monitor_interval  = 5; // МрПиМфИєЃЈКСУыЃЉ
  repeated string monitor_keys = 1; // МрПиЯюМќУћЃЌЮЊПеБэЪОМрПиЫљга
}

message MonitorSnapshotRequest {
  int64 platform_id = 2;
  repeated string monitor_keys = 1; // МрПиЯюМќУћ
}

message MonitorEvent {
  int64 platform_id = 3; // ЦНЬЈ IDЃЈЛиЯдЃЉ
  google.protobuf.Timestamp record_time = 20; // МЧТМЪБМф
  Status status = 1; // ЕБЧАМрПизДЬЌ
  repeated MonitorItem monitor_items = 5; // МрПиЪ§ОнЯюСаБэ
}

message MonitorItem {
  string module_name               = 11; // ФЃПщУћГЦ
  string monitor_key_description   = 12; // МрПиЯюжаЮФУшЪі
  string monitor_key               = 13; // МрПиЯюБъЪЖЃЈМќЃЉ
  string monitor_value             = 14; // МрПижЕ
  string monitor_unit              = 15; // ЕЅЮЛ

}

// ----------------------------------------
// ЪЕбщзЗзйгыЪ§Он
// ----------------------------------------

message SampleTraceMessage {
  int64  original_sample_id         = 1;       // д­ЪМНјбљ ID
  int64  sample_id                  = 2;       // ЮЈвЛНјбљ ID
  int32  sample_group_id            = 3;       // Нјбљзщ ID
  string sample_type                = 4;       // бљЦЗРраЭ
  string sample_name                = 5;       // бљЦЗУћГЦ
  string sample_sn                  = 6;       //бљЦЗЖўЮЌТы
  string sample_remarks             = 7;       // бљЦЗБИзЂ
  string module_action_id           = 8;       // ФЃПщЖЏзї ID
  int32  module_serial_number       = 9;       // ФЃПщађСаКХ
  string module_name                = 10;      // ФЃПщУћГЦ
  string labware_name               = 11;      // бљЦЗЦїУѓУћГЦ
  string module_action_description  = 12;      // ЕБЧАЖЏзїУшЪіЃЈШчМгбЮ/ХЈЫѕЃЉ
  repeated EbrMessage ebr_infos     = 13;      // ЪЕбщЪ§ОнЯю
  google.protobuf.Timestamp start_time   = 14; // ПЊЪМЪБМф
  google.protobuf.Timestamp end_time     = 15; // НсЪјЪБМф
  double elapsed_time               = 16;      // жДааКФЪБЃЈУыЃЉ

  // ЪЕбщЪ§ОнЯюЃЈEBRЃКElectronic Batch RecordЃЉ
  message EbrMessage {
    string key_description = 10; // Ъ§ОнЯюжаЮФУшЪі
    string key             = 11; // Ъ§ОнЯюМќ
    string value           = 12; // Ъ§ОнжЕ
    string unit            = 13; // ЕЅЮЛ
    google.protobuf.Timestamp record_time = 20; // МЧТМЪБМф
  }
}
// ----------------------------------------
// ШЮЮёЪТМўСїЃЈЪЕЪБЗДРЁЃЉ
// ----------------------------------------

message TaskEvent {
  StartTaskStatus start_task_status  = 1; // ШЮЮёзДЬЌ
  int64  platform_task_id            = 2; // ЦНЬЈШЮЮё ID
  int64  platform_id                 = 3; // ЦНЬЈ ID
  int64  task_id                     = 4; // ЪЕбщШЮЮё ID
  string platform_name               = 6; // ЦНЬЈУћГЦ
  google.protobuf.Timestamp response_time = 10;  //ЯьгІЪБМф
  SampleTraceMessage sample_trace_message = 101; //бљЦЗЪЕбщЪ§ОнБЈИцЃЈПЩбЁЃЉ
}

// ----------------------------------------
// ЗўЮёЖЈвх
// ----------------------------------------

// ЦНЬЈГѕЪМЛЏЗўЮё
service PlatformInitService {
  /*
  * ГѕЪМЛЏ
  */
  rpc Initialize(InitializeRequest) returns (Status);
}

// ЦНЬЈдЫааЪБПижЦЗўЮё
service PlatformRuntimeService {
  /*
  * ЛёШЁЦНЬЈзДЬЌ
  */
  rpc GetPlatformStatus(PlatformRequest) returns (PlatformStatusResponseMessage);
  /*
  * ИДЮЛ
  */
  rpc ResetPlatform(PlatformRequest) returns (Status);
  /*
  * днЭЃ
  */
  rpc PausePlatform(PlatformRequest) returns (Status);
  /*
  * ЛжИД
  */
  rpc ResumePlatform(PlatformRequest) returns (Status);
  /*
  * ЭЃжЙ
  */
  rpc StopPlatform(PlatformRequest) returns (Status);
  /*
  * ЦєЖЏЦНЬЈ
  */
  rpc StartPlatform(PlatformRequest) returns (Status);
  /*
  * ЦНЬЈИцОЏаХЯЂСї
  */
  rpc GetPlatformAlarms(PlatformRequest) returns (stream AlarmEvent);
}

// ЦНЬЈШЮЮёЗўЮё
service PlatformTaskService {
  /*
  * зМБИЪЕбщШЮЮё
  */
  rpc PrepareTask(PrepareTaskRequest) returns (Status);
  /*
  * ЩшжУПЊЪМШЮЮёВЮЪ§
  */
  rpc SetupTask(SetupTaskRequest) returns (Status);
  /*
  * ПЊЪМЪЕбщШЮЮё
  */
  rpc StartTask(StartTaskRequest) returns (stream TaskEvent);
  /*
  * ЪЕбщЗтДц
  */
  rpc StoreTask(StoreTaskRequest) returns (Status);
  /*
  * ЪЕбщЪеЮВ
  */
  rpc FinalizeTask(FinalizeTaskRequest) returns (Status);
  /*
  * ЛёШЁШЮЮёзЗзйаХЯЂ
  */
  rpc GetTaskTraces(TaskTracesRequest) returns (TaskTracesReply);
  /*
  * ЛёШЁШЮЮёжаЭаХЬЪЙгУЧщПі
  */
  rpc GetTaskTraykUsage(TaskTrayUsageRequest) returns (TaskTrayUsageReply);
  /*
  * ЛёШЁШЮЮёжаЭаХЬЦїУѓаХЯЂ
  */
  rpc GetTaskTrayLabwareInfo(TaskTrayLabwareInfoRequest) returns (TaskTrayLabwareInfoReply);
 /*
  * ЛёШЁШЮЮёжаИїПзЮЛЪзДЮЩЈТыАѓЖЈаХЯЂ
  */
  rpc GetTrayInitialBindingInfo (TaskTrayInitialBindingInfoRequest) returns (TaskTrayInitialBindingInfoReply);
}

// ЦНЬЈМрПиЗўЮё
service PlatformMonitorService {
  /*
  * МрПиСї
  */
  rpc StartMonitor(StartMonitorRequest) returns (stream MonitorEvent);
  /*
  * ЛёШЁМрПиПьее
  */
  rpc GetMonitorSnapshot(MonitorSnapshotRequest) returns (MonitorEvent);
}

// ХфжУЙмРэЗўЮё
service ConfigService {
  /*
  * ЛёШЁЪЕбщЪвХфжУ
  */
  rpc GetLaboratoryConfigs(google.protobuf.Empty) returns (LaboratoryDefinition);
}

// ЦНЬЈжазЊЗўЮё
service PlatformTransferService {
  /*
  * жазЊГѕЪМЛЏ
  */
  rpc TransferInit(TransferInitRequest) returns (TransferInitResponseMessage);
  /*
  * ЛёШЁжазЊзДЬЌ
  */
  rpc GetTransferStatus(TransferStatusRequest) returns (TransferStatusResponseMessage);
  /*
  * ЭаХЬЕНжазЊ
  */
  rpc TrayToTransfer(TransferTrayMoveRequest) returns (TransferTrayMoveResponse);
  /*
  * жазЊЕНЭаХЬ(аТЕФбљЦЗID)
  */
  rpc TransferToTray(TransferTrayMoveRequest) returns (TransferTrayMoveResponse);
  /*
  * жазЊЯТСЯЮЛ Ёњ ЯрСкжазЊЩЯСЯЮЛЃЈКсЯђНЛНгЃЉ
  */
  rpc UnloadTransferToLoadTransfer(UnloadTransferToLoadTransferRequest) returns (UnloadTransferToLoadTransferResponse);
  /*
  * жазЊЩЯСЯЮЛ Ёњ ЯрСкжазЊЯТСЯЮЛЃЈЗДЯђКсЯђНЛНгЃЉ
  */
  rpc LoadTransferToUnloadTransfer(LoadTransferToUnloadTransferRequest) returns (LoadTransferToUnloadTransferResponse);
  /*
  * жазЊе§ЯђвЦЖЏ
  */
  rpc TransferForward(TransferMoveRequest) returns (TransferMoveResponseMessage);
  /*
  * жазЊЗДЯђвЦЖЏ
  */
  rpc TransferBackward(TransferMoveRequest) returns (TransferMoveResponseMessage);

}